<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Expense Manager{% endblock %}</title>
  <!-- Bootstrap CSS – no integrity check so it always loads -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top shadow-sm" id="mainNav">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" href="/dashboard">
      <span class="text-primary">💰</span> Expense Manager
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="/dashboard">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/expenses/new">Add Expense</a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-2">
        <button id="logoutBtn" class="btn btn-sm btn-outline-danger d-none">Logout</button>
        <button id="themeToggle" class="btn btn-sm btn-outline-secondary">🌙 Dark</button>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 main-content">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
