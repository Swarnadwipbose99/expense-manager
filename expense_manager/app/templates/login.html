{% extends "base.html" %}
{% block title %}Login – Expense Manager{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-4">
        <h3 class="mb-1 fw-bold">Welcome back</h3>
        <p class="text-muted mb-4">Sign in to your account</p>

        <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email"
                   placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password"
                   placeholder="••••••••" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary w-100" id="loginBtn">
            <span id="loginSpinner" class="spinner-border spinner-border-sm d-none me-1"></span>
            Sign In
          </button>
        </form>

        <hr class="my-3" />
        <p class="text-center mb-0 small">
          Don't have an account?
          <a href="/signup" class="text-decoration-none fw-semibold">Sign up</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const spinner = document.getElementById('loginSpinner');
  const alert = document.getElementById('loginAlert');

  btn.disabled = true;
  spinner.classList.remove('d-none');
  alert.classList.add('d-none');

  try {
    const res = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('jwt', data.access_token);
      localStorage.setItem('refresh_token', data.refresh_token);
      window.location.href = '/dashboard';
    } else {
      alert.textContent = data.msg || 'Login failed';
      alert.classList.remove('d-none');
    }
  } catch (err) {
    alert.textContent = 'Network error – please try again.';
    alert.classList.remove('d-none');
  } finally {
    btn.disabled = false;
    spinner.classList.add('d-none');
  }
});
</script>
{% endblock %}
